name: PhysioInvoice Professional Build
on:
  push:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Standalone Web Assets
        run: npm run build
          
      - name: Setup Capacitor Android
        run: npx cap sync
          
      - name: Generate Release Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias physio -keyalg RSA -keysize 2048 -validity 10000 -storepass physio2026 -keypass physio2026 -dname "CN=PhysioInvoice, OU=Mobile, O=InvoiceStudio, L=Delhi, S=Delhi, C=IN"

      - name: Build and Sign Release APK
        run: |
          cd android
          chmod +x gradlew
          # Pass signing properties to Gradle
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=physio2026 \
            -Pandroid.injected.signing.key.alias=physio \
            -Pandroid.injected.signing.key.password=physio2026

      - name: List Output Files (Debug)
        if: always()
        run: |
          find android/app/build/outputs/apk -name "*.apk" || echo "No APKs found"

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: PhysioInvoice-Signed-Release
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Keystore (SAVE THIS!)
        uses: actions/upload-artifact@v4
        with:
          name: PhysioInvoice-Release-Keystore
          path: release.keystore
